<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora Live - Video Match</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #121212;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
        }
        h1 { color: #fff; }
        #status { color: #ffeb3b; margin-bottom: 20px; }
        .video-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        video {
            width: 300px;
            height: 400px;
            background-color: #222;
            border-radius: 10px;
            object-fit: cover;
        }
        .controls { margin: 20px; }
        button {
            padding: 10px 20px;
            font-size: 16px;
            background-color: #ff4757;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background-color: #e84118; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; }
    </style>
</head>
<body>

    <h1>Xora Live Video Chat</h1>
    <h3 id="status">Status: Disconnected</h3>

    <div class="controls">
        <label for="gender">I am a: </label>
        <select id="gender">
            <option value="Boy">Boy</option>
            <option value="Girl">Girl</option>
        </select>
        <button id="startBtn" onclick="startMatching()">Start Match</button>
    </div>

    <div class="video-container">
        <div>
            <h3>You</h3>
            <video id="localVideo" autoplay playsinline muted></video>
        </div>
        <div>
            <h3>Partner</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <!-- Socket.io Client Library -->
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    
    <script>
        // Sahi aur dynamic routing link
        const socket = io();

        let localStream;
        let pc;
        const config = {
            iceServers: [{ urls: "stun:stun.l.google.com:19302" }]
        };

        // Server connection handle karne ke liye
        socket.on('connect', () => {
            document.getElementById('status').innerText = "Status: Connected to Server!";
            document.getElementById('status').style.color = "#4CAF50";
        });

        socket.on('connect_error', (error) => {
            document.getElementById('status').innerText = "Status: Retrying connection...";
            document.getElementById('status').style.color = "#FFC107";
        });

        socket.on('disconnect', () => {
            document.getElementById('status').innerText = "Status: Disconnected";
            document.getElementById('status').style.color = "#ff4757";
        });

        async function startMatching() {
            const gender = document.getElementById('gender').value;
            document.getElementById('status').innerText = "Status: Searching for a partner...";
            document.getElementById('status').style.color = "#ffeb3b";
            
            // Camera and Mic permission
            localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
            document.getElementById('localVideo').srcObject = localStream;

            socket.emit('register', { gender });
        }

        socket.on("matched", async (data) => {
            document.getElementById('status').innerText = "Status: Match Found! Connecting video...";
            document.getElementById('status').style.color = "#4CAF50";

            pc = new RTCPeerConnection(config);

            // Remote stream incoming handle karna
            pc.ontrack = (event) => {
                document.getElementById('remoteVideo').srcObject = event.streams[0];
            };

            // Local tracks add karna
            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            // WebRTC Ice Candidates signal exchange
            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("signal", { to: data.partnerId, signal: { candidate: event.candidate } });
                }
            };

            if (data.createOffer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("signal", { to: data.partnerId, signal: { sdp: offer } });
            }
        });

        socket.on("signal", async (data) => {
            if (!pc) return;
            if (data.signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                if (pc.remoteDescription.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit("signal", { to: data.from, signal: { sdp: answer } });
                }
            } else if (data.signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora Live - Core Ecosystem</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #0b0b0d; color: #f1f2f6; text-align: center; margin: 0; padding: 0; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: radial-gradient(circle, #1c1d24 0%, #0c0d12 100%); }
        .login-btn { background-color: #ffffff; color: #121212; padding: 14px 30px; font-size: 16px; font-weight: 700; border: none; border-radius: 30px; cursor: pointer; display: flex; align-items: center; gap: 12px; box-shadow: 0 4px 20px rgba(255,255,255,0.15); transition: 0.3s ease; }
        .login-btn:hover { transform: scale(1.03); background-color: #f5f6fa; }
        #app-screen { display: none; padding: 25px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #16171f; padding: 12px 25px; border-radius: 14px; border: 1px solid #232533; margin-bottom: 25px; }
        .user-info { display: flex; align-items: center; gap: 12px; }
        .user-pic { width: 44px; height: 44px; border-radius: 50%; border: 2px solid #ff4757; object-fit: cover; }
        .premium-btn { background: linear-gradient(45deg, #ffd700, #ff9f43); color: #000; padding: 10px 20px; font-weight: 800; border: none; border-radius: 25px; cursor: pointer; box-shadow: 0 4px 15px rgba(255,215,0,0.3); transition: 0.3s; }
        .premium-btn:hover { transform: translateY(-2px); }
        #status { color: #f1c40f; margin: 20px 0; font-size: 18px; font-weight: 600; }
        .video-container { display: flex; justify-content: center; gap: 25px; margin-top: 25px; flex-wrap: wrap; }
        video { width: 340px; height: 440px; background-color: #16171f; border-radius: 18px; object-fit: cover; border: 2px solid #232533; transition: 0.3s; }
        .controls { margin: 20px auto; max-width: 700px; background: #16171f; padding: 25px; border-radius: 16px; border: 1px solid #232533; }
        .start-btn { padding: 14px 40px; font-size: 18px; background-color: #ff4757; color: white; border: none; border-radius: 30px; cursor: pointer; font-weight: 700; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(255,71,87,0.3); }
        .start-btn:hover { background-color: #ff6b81; }
        select { padding: 12px; font-size: 15px; border-radius: 8px; background: #2f3146; color: white; border: 1px solid #3d415e; margin: 0 12px; outline: none; }
        .badge { background: #ff4757; color: white; padding: 4px 10px; font-size: 11px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1 style="font-size: 36px; margin-bottom: 10px; letter-spacing: -1px;">Xora Live</h1>
        <p style="color: #a4b0be; margin-bottom: 30px;">Authenticate secure active protocols via corporate OAuth</p>
        <button class="login-btn" onclick="initiateOAuthSession()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_web_24dp.png" width="22" alt="OAuth Core">
            Sign in with Google
        </button>
    </div>

    <div id="app-screen">
        <div class="navbar">
            <div class="user-info">
                <img id="profile-pic" class="user-pic" src="" alt="Session Token">
                <span id="user-name" style="font-weight: 600;">Acquiring Identity...</span>
                <span id="user-plan" class="badge">Standard Tier</span>
            </div>
            <div>
                <button id="vip-buy-btn" class="premium-btn" onclick="triggerPremiumUpgrade()">Activate VIP Privilege 👑</button>
            </div>
        </div>

        <h3 id="status">Ecosystem Status: Idle Standby</h3>

        <div class="controls">
            <label style="color: #a4b0be;">Identity Matrix: </label>
            <select id="myGender">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>

            <label style="color: #a4b0be; margin-left: 15px;">Target Configuration: </label>
            <select id="searchPreference" onchange="verifyIdentityTiers()">
                <option value="Random">Global Pool (Free)</option>
                <option value="Only Girl">Target Females (👑 VIP)</option>
                <option value="Only Boy">Target Males (👑 VIP)</option>
            </select>
            <br><br>
            <button class="start-btn" onclick="initializeMatchmakingRoute()">Commence Stream Match</button>
        </div>

        <div class="video-container">
            <div><h3 style="margin-bottom: 10px; font-weight: 500; color: #a4b0be;">Local Node (You)</h3><video id="localVideo" autoplay playsinline muted></video></div>
            <div><h3 style="margin-bottom: 10px; font-weight: 500; color: #a4b0be;">Remote Vector (Partner)</h3><video id="remoteVideo" autoplay playsinline></video></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        let localStream;
        let pc;
        let isVIP = false; 
        const rtcConfig = { iceServers: [{ urls: ["stun:stun.l.google.com:19302", "stun:stun1.l.google.com:19302"] }] };

        async function acquireMediaStreams() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: 15 }, 
                    audio: true 
                });
                document.getElementById('localVideo').srcObject = localStream;
                return true;
            } catch (err) {
                console.error("Critical System Framework Interrupted: Media tracks unresolved.", err);
                alert("Core Failure: Grant hardware access permissions to continue.");
                return false;
            }
        }

        async function initiateOAuthSession() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-name').innerText = "Jawaharlal Mahto";
            document.getElementById('profile-pic').src = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100";
            
            await acquireMediaStreams();
        }

        function verifyIdentityTiers() {
            const currentSelection = document.getElementById('searchPreference').value;
            if ((currentSelection === "Only Girl" || currentSelection === "Only Boy") && !isVIP) {
                alert("Access Denied: Target Filters are locked to standard tier users. Please upgrade to VIP.");
                document.getElementById('searchPreference').value = "Random";
            }
        }

        function triggerPremiumUpgrade() {
            isVIP = true;
            document.getElementById('user-plan').innerText = "VIP Tier Active 👑";
            document.getElementById('user-plan').style.background = "linear-gradient(45deg, #ffd700, #ff9f43)";
            document.getElementById('user-plan').style.color = "#000000";
            document.getElementById('vip-buy-btn').style.display = "none";
            alert("Upgrade Successful: VIP structural metrics assigned. Premium targeting options unlocked.");
        }

        async function initializeMatchmakingRoute() {
            const selfGenderToken = document.getElementById('myGender').value;
            const chosenPrefToken = document.getElementById('searchPreference').value;
            document.getElementById('status').innerText = "Scanning network pipelines matching parameters...";
            
            if (!localStream) {
                const streamStatus = await acquireMediaStreams();
                if (!streamStatus) return;
            }
            
            socket.emit('register', { gender: selfGenderToken, preference: chosenPrefToken, isVIP: isVIP });
        }

        socket.on("matched", async (data) => {
            document.getElementById('status').innerText = "Pipeline Synced. Tracking Node Resolution: " + data.partnerGender;
            pc = new RTCPeerConnection(rtcConfig);
            
            pc.ontrack = (event) => { 
                document.getElementById('remoteVideo').srcObject = event.streams[0]; 
            };
            
            if (localStream) {
                localStream.getTracks().forEach(track => pc.addTrack(track, localStream));
            }
            
            pc.onicecandidate = (event) => { 
                if (event.candidate) socket.emit("signal", { to: data.partnerId, signal: { candidate: event.candidate } }); 
            };
            
            if (data.createOffer) {
                const sessionOffer = await pc.createOffer();
                await pc.setLocalDescription(sessionOffer);
                socket.emit("signal", { to: data.partnerId, signal: { sdp: sessionOffer } });
            }
        });

        socket.on("signal", async (data) => {
            if (!pc) return;
            if (data.signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                if (pc.remoteDescription.type === "offer") {
                    const descAnswer = await pc.createAnswer();
                    await pc.setLocalDescription(descAnswer);
                    socket.emit("signal", { to: data.from, signal: { sdp: descAnswer } });
                }
            } else if (data.signal.candidate) { 
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate)); 
            }
        });
    </script>
</body>
</html>

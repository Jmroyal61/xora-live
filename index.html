<script>
    const socket = io("https://xora-live-production.up.railway.app");
    let localStream;
    let peerConnection;
    const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

    // 1. Camera access lena
    async function startMatchingProcess() {
        localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
        document.getElementById("localVideo").srcObject = localStream;
        
        const gender = document.getElementById("gender").value;
        socket.emit("start_match", { gender: gender });
    }

    // 2. Server se match milne par
    socket.on("match_found", async (data) => {
        peerConnection = new RTCPeerConnection(config);
        
        // Apna video track add karna
        localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

        // Samne wale ka video dekhna
        peerConnection.ontrack = (event) => {
            document.getElementById("remoteVideo").srcObject = event.streams[0];
        };

        // Signaling: Offer bhejna
        if (data.initiator) {
            const offer = await peerConnection.createOffer();
            await peerConnection.setLocalDescription(offer);
            socket.emit("send_signal", { to: data.partnerId, signal: { offer } });
        }
    });

    // 3. Signaling ka exchange
    socket.on("receive_signal", async (data) => {
        if (data.signal.offer) {
            await peerConnection.setRemoteDescription(data.signal.offer);
            const answer = await peerConnection.createAnswer();
            await peerConnection.setLocalDescription(answer);
            socket.emit("send_signal", { to: data.from, signal: { answer } });
        } else if (data.signal.answer) {
            await peerConnection.setRemoteDescription(data.signal.answer);
        }
    });
</script>

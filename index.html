<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora Live - VIP Video Match</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #121212; color: white; text-align: center; margin: 0; padding: 0; }
        #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; background: linear-gradient(135deg, #1e1e24, #121212); }
        .login-btn { background-color: white; color: black; padding: 12px 24px; font-size: 16px; font-weight: bold; border: none; border-radius: 25px; cursor: pointer; display: flex; align-items: center; gap: 10px; }
        #app-screen { display: none; padding: 20px; }
        .navbar { display: flex; justify-content: space-between; align-items: center; background-color: #1f1f1f; padding: 10px 20px; border-radius: 10px; margin-bottom: 20px; }
        .user-info { display: flex; align-items: center; gap: 10px; }
        .user-pic { width: 40px; height: 40px; border-radius: 50%; border: 2px solid #ff4757; }
        .premium-btn { background: linear-gradient(45deg, #ffd700, #ffa500); color: black; padding: 8px 16px; font-weight: bold; border: none; border-radius: 20px; cursor: pointer; }
        #status { color: #ffeb3b; margin: 20px 0; }
        .video-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        video { width: 320px; height: 400px; background-color: #222; border-radius: 15px; object-fit: cover; border: 2px solid #333; }
        .controls { margin: 20px; background: #1f1f1f; padding: 20px; border-radius: 10px; }
        .start-btn { padding: 12px 30px; font-size: 18px; background-color: #ff4757; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; }
        select { padding: 10px; font-size: 16px; border-radius: 5px; background: #333; color: white; border: none; margin: 0 10px; }
        .badge { background: #555; color: white; padding: 2px 6px; font-size: 12px; border-radius: 5px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="login-screen">
        <h1>Xora Live</h1>
        <p>Sign in with your Gmail to start matching</p>
        <button class="login-btn" onclick="loginWithGoogle()">
            <img src="https://fonts.gstatic.com/s/i/productlogos/googleg/v6/web-24dp/logo_googleg_color_web_24dp.png" width="20">
            Sign in with Google
        </button>
    </div>

    <div id="app-screen">
        <div class="navbar">
            <div class="user-info">
                <img id="profile-pic" class="user-pic" src="">
                <span id="user-name">Loading...</span>
                <span id="user-plan" class="badge">FREE PLAN</span>
            </div>
            <div>
                <button id="vip-buy-btn" class="premium-btn" onclick="upgradeToPremium()">Upgrade VIP 👑</button>
            </div>
        </div>

        <h3 id="status">Status: Ready to Match</h3>

        <div class="controls">
            <label>I am a: </label>
            <select id="myGender">
                <option value="Boy">Boy</option>
                <option value="Girl">Girl</option>
            </select>

            <label>Want to Match with: </label>
            <select id="searchPreference" onchange="checkVIPPreference()">
                <option value="Random">Anyone (Free)</option>
                <option value="Only Girl">Only Girls (👑 VIP)</option>
                <option value="Only Boy">Only Boys (👑 VIP)</option>
            </select>
            <br><br>
            <button class="start-btn" onclick="startMatching()">Start Match</button>
        </div>

        <div class="video-container">
            <div><h3>You</h3><video id="localVideo" autoplay playsinline muted></video></div>
            <div><h3>Partner</h3><video id="remoteVideo" autoplay playsinline></video></div>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        const socket = io();
        let localStream;
        let pc;
        let isVIP = false; 
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        // Auto Camera Access init karne ke liye function
        async function initCamera() {
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ 
                    video: { width: 320, height: 240, frameRate: 15 }, 
                    audio: true 
                });
                document.getElementById('localVideo').srcObject = localStream;
                return true;
            } catch (err) {
                console.error("Camera error: ", err);
                alert("Please allow Camera and Mic permissions from browser settings then refresh!");
                return false;
            }
        }

        async function loginWithGoogle() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app-screen').style.display = 'block';
            document.getElementById('user-name').innerText = "Jawaharlal Mahto";
            document.getElementById('profile-pic').src = "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100";
            
            // Login hote hi pehle camera chalu karega taaki track fail na ho
            await initCamera();
        }

        function checkVIPPreference() {
            const pref = document.getElementById('searchPreference').value;
            if ((pref === "Only Girl" || pref === "Only Boy") && !isVIP) {
                alert("Only Girls/Boys filter is a Premium VIP Feature! Please upgrade.");
                document.getElementById('searchPreference').value = "Random";
            }
        }

        function upgradeToPremium() {
            isVIP = true;
            document.getElementById('user-plan').innerText = "VIP MEMBER 👑";
            document.getElementById('user-plan').style.background = "linear-gradient(45deg, #ffd700, #ffa500)";
            document.getElementById('user-plan').style.color = "black";
            document.getElementById('vip-buy-btn').style.display = "none";
            alert("Congratulations! VIP Plan Activated. Now you can select Only Girls or Only Boys filter.");
        }

        async function startMatching() {
            const myGender = document.getElementById('myGender').value;
            const preference = document.getElementById('searchPreference').value;
            document.getElementById('status').innerText = "Searching according to your preference...";
            
            // Check condition agar stream ready nahi hai toh re-init karega
            if (!localStream) {
                const hasCam = await initCamera();
                if (!hasCam) return;
            }
            
            socket.emit('register', { gender: myGender, preference: preference, isVIP: isVIP });
        }

        socket.on("matched", async (data) => {
            document.getElementById('status').innerText = "Connected with " + data.partnerGender;
            pc = new RTCPeerConnection(config);
            
            pc.ontrack = (e) => { 
                document.getElementById('remoteVideo').srcObject = e.streams[0]; 
            };
            
            if (localStream) {
                localStream.getTracks().forEach(t => pc.addTrack(t, localStream));
            }
            
            pc.onicecandidate = (e) => { 
                if (e.candidate) socket.emit("signal", { to: data.partnerId, signal: { candidate: e.candidate } }); 
            };
            
            if (data.createOffer) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("signal", { to: data.partnerId, signal: { sdp: offer } });
            }
        });

        socket.on("signal", async (data) => {
            if (!pc) return;
            if (data.signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal.sdp));
                if (pc.remoteDescription.type === "offer") {
                    const ans = await pc.createAnswer();
                    await pc.setLocalDescription(ans);
                    socket.emit("signal", { to: data.from, signal: { sdp: ans } });
                }
            } else if (data.signal.candidate) { 
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate)); 
            }
        });
    </script>
</body>
</html>

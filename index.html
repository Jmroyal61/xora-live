<video id="localVideo" autoplay muted></video>
<video id="remoteVideo" autoplay></video>
<select id="gender"><option value="boy">Boy</option><option value="girl">Girl</option></select>
<button onclick="start()">Start Match</button>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
    const socket = io("https://xora-live-production.up.railway.app");
    let pc = new RTCPeerConnection({iceServers: [{urls: "stun:stun.l.google.com:19302"}]});

    async function start() {
        let stream = await navigator.mediaDevices.getUserMedia({video: true, audio: true});
        document.getElementById('localVideo').srcObject = stream;
        stream.getTracks().forEach(track => pc.addTrack(track, stream));
        socket.emit("start_match", document.getElementById("gender").value);
    }

    socket.on("matched", async (data) => {
        pc.ontrack = e => document.getElementById('remoteVideo').srcObject = e.streams[0];
        if (data.initiator) {
            let offer = await pc.createOffer();
            await pc.setLocalDescription(offer);
            socket.emit("signal", {to: data.partnerId, signal: offer});
        }
    });

    socket.on("signal", async (data) => {
        if (data.signal.type === "offer") {
            await pc.setRemoteDescription(data.signal);
            let answer = await pc.createAnswer();
            await pc.setLocalDescription(answer);
            socket.emit("signal", {to: data.from, signal: answer});
        } else {
            await pc.setRemoteDescription(data.signal);
        }
    });
</script>

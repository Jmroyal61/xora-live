<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora Live - Video Matching</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .video-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
        video { width: 45%; max-width: 400px; height: 300px; background: #222; border-radius: 10px; object-fit: cover; }
        select, button { padding: 12px 24px; font-size: 16px; margin: 10px; border-radius: 5px; border: none; cursor: pointer; }
        button { background: #ff4757; color: white; font-weight: bold; }
        #status { color: #ffeaa7; font-size: 18px; margin: 10px; }
    </style>
</head>
<body>

    <h1>Xora Live Video Chat</h1>
    <div id="status">Status: Disconnected</div>

    <div>
        <label for="gender">I am a: </label>
        <select id="gender">
            <option value="boy">Boy</option>
            <option value="girl">Girl</option>
        </select>
        <button onclick="startMatching()">Start Match</button>
    </div>

    <div class="video-container">
        <div>
            <h3>You</h3>
            <video id="localVideo" autoplay muted playsinline></video>
        </div>
        <div>
            <h3>Partner</h3>
            <video id="remoteVideo" autoplay playsinline></video>
        </div>
    </div>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script>
        // Aapka live Railway backend connection link
        const socket = io({
    transports: ['websocket'],
    upgrade: false
});
        let localStream;
        let pc;
        const config = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Status: Connected to Server!";
        });

        async function startMatching() {
            document.getElementById("status").innerText = "Accessing Camera & Joining Queue...";
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById("localVideo").srcObject = localStream;

                const gender = document.getElementById("gender").value;
                socket.emit("start_match", gender);
            } catch (err) {
                document.getElementById("status").innerText = "Camera error: Please allow camera access.";
                console.error(err);
            }
        }

        socket.on("waiting", (msg) => {
            document.getElementById("status").innerText = "Status: " + msg;
        });

        socket.on("matched", async (data) => {
            document.getElementById("status").innerText = "Status: Match Found! Connecting video...";
            pc = new RTCPeerConnection(config);

            pc.ontrack = (event) => {
                document.getElementById("remoteVideo").srcObject = event.streams[0];
            };

            localStream.getTracks().forEach(track => pc.addTrack(track, localStream));

            pc.onicecandidate = (event) => {
                if (event.candidate) {
                    socket.emit("signal", { to: data.partnerId, signal: { candidate: event.candidate } });
                }
            };

            if (data.initiator) {
                const offer = await pc.createOffer();
                await pc.setLocalDescription(offer);
                socket.emit("signal", { to: data.partnerId, signal: offer });
            }
        });

        socket.on("signal", async (data) => {
            if (!pc) return;
            if (data.signal.sdp) {
                await pc.setRemoteDescription(new RTCSessionDescription(data.signal));
                if (data.signal.type === "offer") {
                    const answer = await pc.createAnswer();
                    await pc.setLocalDescription(answer);
                    socket.emit("signal", { to: data.from, signal: answer });
                }
            } else if (data.signal.candidate) {
                await pc.addIceCandidate(new RTCIceCandidate(data.signal.candidate));
            }
        });
    </script>
</body>
</html>

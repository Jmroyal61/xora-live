<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Xora Live - Video Matching Test</title>
    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #121212; color: white; padding: 20px; }
        .setup-box { background: #1e1e1e; padding: 20px; border-radius: 10px; display: inline-block; margin-top: 50px; }
        select, input, button { padding: 10px; margin: 10px; font-size: 16px; border-radius: 5px; border: none; }
        button { background: #ff4757; color: white; cursor: pointer; font-weight: bold; }
        button:hover { background: #ff6b81; }
        .video-container { display: none; margin-top: 30px; }
        .video-box { width: 45%; max-width: 400px; height: 300px; background: #2f3542; display: inline-block; margin: 10px; border-radius: 10px; overflow: hidden; position: relative; }
        video { width: 100%; height: 100%; object-fit: cover; }
        .label { position: absolute; bottom: 10px; left: 10px; background: rgba(0,0,0,0.6); padding: 5px 10px; border-radius: 5px; }
        #status { font-size: 18px; color: #eccc68; margin: 20px; }
    </style>
</head>
<body>

    <h1>🎬 Xora Live Matching Interface</h1>
    <div id="status">Server Status: Connecting...</div>

    <div class="setup-box" id="setupScreen">
        <h3>Enter Details to Start Matching</h3>
        <input type="text" id="username" placeholder="Your Name" value="User_Test"><br>
        <select id="gender">
            <option value="boy">I am a Boy ♂️</option>
            <option value="girl">I am a Girl ♀️</option>
        </select><br>
        <button onclick="startMatchingProcess()">Start Match</button>
    </div>

    <div class="video-container" id="videoScreen">
        <div class="video-box">
            <video id="localVideo" autoplay playsinline muted></video>
            <div class="label">You (My Camera)</div>
        </div>
        <div class="video-box">
            <video id="remoteVideo" autoplay playsinline></video>
            <div class="label" id="partnerLabel">Partner (Connecting...)</div>
        </div>
        <br>
        <button onclick="nextMatch()">Next / Disconnect</button>
    </div>

    <script>
        // Aapka live Railway Backend URL
        const socket = io("https://xora-live-production.up.railway.app");
        let localStream;
        let peerConnection;
        
        // WebRTC Config (STUN Servers connection banwane ke liye)
        const rtcConfig = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

        socket.on("connect", () => {
            document.getElementById("status").innerText = "Connected to Server. Ready to Match!";
            document.getElementById("status").style.color = "#2ed573";
        });

        // 1. Jab button dabayenge toh matching start hogi
        async function startMatchingProcess() {
            const name = document.getElementById("username").value;
            const gender = document.getElementById("gender").value;

            // Camera aur Mic access lena
            try {
                localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                document.getElementById("localVideo").srcObject = localStream;
            } catch (err) {
                alert("Please allow Camera and Microphone permissions!");
                return;
            }

            document.getElementById("setupScreen").style.display = "none";
            document.getElementById("videoScreen").style.display = "block";
            document.getElementById("status").innerText = "Searching for opposite gender...";

            // Server ko details bhejna
            socket.emit("start_match", { name: name, gender: gender });
        }

        // 2. Jab server Boy-Girl ka match karwa dega
        socket.on("match_found", async (data) => {
            document.getElementById("status").innerText = Matched with ${data.partnerName}!;
            document.getElementById("partnerLabel").innerText = ${data.partnerName} (${data.partnerGender});
            
            // WebRTC Connection setup shuru karna
            setupPeerConnection(data.partnerId, data.initiator);
        });

        // Server waiting state
        socket.on("waiting", (data) => {
            document.getElementById("status").innerText = data.message;
        });

        // Partner chor kar chala gaya
        socket.on("partner_disconnected", () => {
            document.getElementById("status").innerText = "Partner disconnected. Searching again...";
            resetVideoCall();
            // Automatically automatic next match dhoondna
            startMatchingProcess();
        });

        // WebRTC Signaling Logic (Peer to Peer stream set karna)
        function setupPeerConnection(partnerId, isInitiator) {
            peerConnection = new RTCPeerConnection(rtcConfig);

            // Local Video Tracks ko connection mein jorna
            localStream.getTracks().forEach(track => peerConnection.addTrack(track, localStream));

            // Jab remote camera stream receive ho
            peerConnection.ontrack = (event) => {
                document.getElementById("remoteVideo").srcObject = event.streams[0];
            };

            // Ice Candidates share karna
            peerConnection.onicecandidate = (event) => {
                if (event.candidate) {
                    // Yahan signaling use hoti hai
                }
            };
        }

        function nextMatch() {
            window.location.reload(); // Simple reset for testing
        }

        function resetVideoCall() {
            if (peerConnection) {
                peerConnection.close();
                peerConnection = null;
            }
            document.getElementById("remoteVideo").srcObject = null;
        }
    </script>
</body>
</html>
